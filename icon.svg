<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Aquarell Hintergrund Gradient -->
    <radialGradient id="bg1" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#dce8f5"/>
      <stop offset="40%" stop-color="#e8d8f0"/>
      <stop offset="100%" stop-color="#f5d8e8"/>
    </radialGradient>
    <radialGradient id="bg2" cx="70%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#c8eadf" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f2c8d8" stop-opacity="0.3"/>
    </radialGradient>
    <!-- Aquarell Flecken Filter -->
    <filter id="watercolor" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Abgerundetes Rechteck -->
  <rect width="512" height="512" rx="90" fill="url(#bg1)"/>
  <rect width="512" height="512" rx="90" fill="url(#bg2)"/>

  <!-- Aquarell Flecken für Textur -->
  <ellipse cx="120" cy="100" rx="180" ry="120" fill="#d8cff0" opacity="0.25" filter="url(#watercolor)"/>
  <ellipse cx="380" cy="380" rx="160" ry="130" fill="#c8eadf" opacity="0.2" filter="url(#watercolor)"/>
  <ellipse cx="400" cy="120" rx="100" ry="80" fill="#f5d8e8" opacity="0.3" filter="url(#watercolor)"/>

  <!-- Dekorative Linie oben -->
  <line x1="100" y1="168" x2="412" y2="168" stroke="#c57f63" stroke-width="1.5" opacity="0.5"/>

  <!-- "Fühlkraft" -->
  <text x="256" y="250"
    font-family="Georgia, 'Liberation Serif', serif"
    font-size="88"
    font-weight="700"
    fill="#5a3224"
    text-anchor="middle"
    letter-spacing="2">Fühlkraft</text>

  <!-- Dekorative Linie mitte -->
  <line x1="140" y1="278" x2="372" y2="278" stroke="#c57f63" stroke-width="1" opacity="0.4"/>

  <!-- "Kalender" kursiv -->
  <text x="256" y="340"
    font-family="Georgia, 'Liberation Serif', serif"
    font-size="56"
    font-style="italic"
    fill="#c57f63"
    text-anchor="middle"
    letter-spacing="4">Kalender</text>

  <!-- Kleine Dekoelemente -->
  <circle cx="108" cy="278" r="3" fill="#c57f63" opacity="0.5"/>
  <circle cx="404" cy="278" r="3" fill="#c57f63" opacity="0.5"/>
</svg>
